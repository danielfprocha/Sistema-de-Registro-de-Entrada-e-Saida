<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - Registro de Ponto</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header>
        <p>Registro de <span id="header-entrada">Entrada</span> e <span id="header-saida">Saída</span></p>
    </header>

    <main>
        <div class="main-box">
            <div id="admin-topo">
                <div>
                    <h1 class="box-titulo">Painel Administrador</h1>
                    <p class="box-subtitulo">Todos os registros de ponto da equipe:</p>
                </div>
            </div>

            <div id="admin-filtros">
                <div class="filtro-grupo">
                    <label for="filtro-nome">Funcionário</label>
                    <input type="text" id="filtro-nome" placeholder="Buscar por nome...">
                </div>
                <div class="filtro-grupo">
                    <label for="filtro-data">Data</label>
                    <input type="date" id="filtro-data">
                </div>
                <button id="btn-filtrar">Filtrar</button>
                <button id="btn-limpar">Limpar</button>
            </div>

            <div class="tabela-wrapper">
                <table class="tabela">
                        <thead>
                            <tr>
                                <th>Funcionário</th>
                                <th>Cargo</th>
                                <th>Data</th>
                                <th>Hora</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="td-nome">Eduarda</td>
                                <td>Estagiária</td>
                                <td>04/05/2026</td>
                                <td>08:47</td>
                                <td><span class="badge badge-entrada">Entrada</span></td>
                            </tr>
                        </tbody>
                </table>
            </div>

            <p id="admin-vazio" class="msg-erro">
                Nenhum registro encontrado para os filtros aplicados.
            </p>
        </div>
    </main>

    <footer>
        <p>Sistema de Registro de Ponto - Clínica Veterinária UniBH</p>
    </footer>
</body>
</html>
