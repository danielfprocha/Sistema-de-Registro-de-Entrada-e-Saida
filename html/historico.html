<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Registro de Ponto</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/historico.css">
</head>
<body>
    <header>
        <p class="header-titulo">Registro de <span id="header-entrada">Entrada</span> e <span id="header-saida">Saída</span></p>
    </header>

    <main>
        <div class="main-box">
            <div id="historico-topo">
                <div>
                    <h1 class="box-titulo">Meu Histórico</h1>
                    <p class="box-subtitulo">Seus últimos registros de ponto:</p>
                </div>
            </div>

            <div class="tabela-historico">
                <table class="tabela" id="tabela-historico">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Hora</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>

            <p id="historico-vazio" class="msg-erro" style="display: none;">
                Nenhum registro encontrado.
            </p>
        </div>
    </main>

    <button class="sair" onclick="logout()">Voltar</button>

    <footer>
        <p>Sistema de Registro de Ponto - Clínica Veterinária UniBH</p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/historico.js"></script>
</body>
</html>
