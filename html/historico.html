<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Registro de Ponto</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/historico.css">
</head>
<body>
    <header>
        <p class="header-titulo">Registro de <span id="header-entrada">Entrada</span> e <span id="header-saida">Saída</span></p>
    </header>

    <main>
        <div class="main-box">
            <div class="historico-topo">
                <div class="historico-icone-titulo">
                    <span class="historico-icone">🕐</span>
                    <div>
                        <h1 class="box-titulo">Meu Histórico</h1>
                        <p class="box-subtitulo">Últimos 10 registros de ponto</p>
                    </div>
                </div>
            </div>

            <div id="lista-registros" class="lista-registros"></div>

            <p id="historico-vazio" class="msg-vazio" style="display: none;">
                <span>📭</span><br>Nenhum registro encontrado.
            </p>
        </div>
    </main>

    <button class="sair" onclick="window.location.href='registro.html'">Voltar</button>

    <footer>
        <p>Sistema de Registro de Ponto - Clínica Veterinária UniBH</p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/historico.js"></script>
</body>
</html>
