<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Registro de Ponto</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/qrcode.css">
</head>
<body>
    <header>
        <p class="header-titulo">Registro de <span id="header-entrada">Entrada</span> e <span id="header-saida">Saída</span></p>
    </header>

    <main>
        <div class="main-box">
 
            <h1 class="box-titulo">Escanear QR Code</h1>
            <p class="box-subtitulo">Aponte a câmera para o QR Code na entrada da clínica</p>
 
            <div id="qr-reader">
                <div id="qr-placeholder">
                    <span id="qr-icone">📷</span>
                    <p>A câmera aparecerá aqui:</p>
                </div>
            </div>
 
            <p id="msg-erro-qr" class="msg-erro" style="display: none;">
                ⚠️ Não foi possível acessar a câmera. Verifique as permissões do navegador.
            </p>
 
        </div>
    </main>
    ]
    <button class="sair" onclick="logout()">Voltar</button>

    <footer>
        <p>Sistema de Registro de Ponto - Clínica Veterinária UniBH</p>
    </footer>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/qrcode.js"></script>
</body>
</html>
