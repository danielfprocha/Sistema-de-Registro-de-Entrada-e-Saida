<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Registro</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/registro.css">
</head>
<body>
    <header>
        <p>Registro de <span id="header-entrada">Entrada</span> e <span id="header-saida">Saída</span></p>
    </header>

    <main>
        <div id="registrar-ponto-box">
            <h1 id="registrar-ponto-titulo">Registrar Ponto</h1>
            <p id="registrar-ponto-subtitulo">Selecione a ação desejada:</p>

            <div class="botoes-registro">
                <button class="botao-registro botao-entrada">
                    <span class="icone">→</span>
                    Entrada
                </button>
                <button class="botao-registro botao-saida">
                    <span class="icone">←</span>
                    Saída
                </button>
            </div>
        </div>
    </main>

    <footer>
        <p>Sistema de Registro de Ponto - Clínica Veterinária UniBH</p>
    </footer>
</body>
</html>
